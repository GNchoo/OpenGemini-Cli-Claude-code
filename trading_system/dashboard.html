<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 트레이더 마크 - 모의투자 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e;
    --green: #3fb950; --red: #f85149; --blue: #58a6ff; --yellow: #d29922;
    --purple: #bc8cff; --orange: #ffa657;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; }
  h1 { font-size: 1.4rem; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }
  .grid { display: grid; gap: 16px; }
  .grid-5 { grid-template-columns: repeat(5, 1fr); }
  .grid-2 { grid-template-columns: repeat(2, 1fr); }
  .grid-3 { grid-template-columns: 2fr 1fr; }
  @media(max-width:1100px) { .grid-5 { grid-template-columns: repeat(3, 1fr); } }
  @media(max-width:700px) { .grid-5 { grid-template-columns: repeat(2, 1fr); } }
  @media(max-width:400px) { .grid-5 { grid-template-columns: 1fr; } }
  @media(max-width:900px) { .grid-2,.grid-3 { grid-template-columns: 1fr 1fr; } }
  @media(max-width:500px) { .grid-2,.grid-3 { grid-template-columns: 1fr; } }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .card h2 { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
  .stat { font-size: 1.8rem; font-weight: 700; }
  .stat-sub { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
  .up { color: var(--green); } .down { color: var(--red); } .neu { color: var(--blue); }
  .chart-wrap { position: relative; height: 280px; }
  .chart-wrap-lg { position: relative; height: 360px; }
  .tab-bar { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  .tab { padding:4px 12px; border-radius:6px; border:1px solid var(--border); background:transparent;
         color:var(--muted); cursor:pointer; font-size:0.8rem; transition:.15s; }
  .tab.active { background:var(--blue); border-color:var(--blue); color:#fff; }
  table { width:100%; border-collapse:collapse; font-size:0.82rem; }
  th { color:var(--muted); font-weight:500; padding:6px 8px; text-align:left; border-bottom:1px solid var(--border); }
  td { padding:6px 8px; border-bottom:1px solid #21262d; }
  tr:last-child td { border-bottom:none; }
  .badge { display:inline-block; padding:2px 7px; border-radius:4px; font-size:0.75rem; font-weight:600; }
  .badge-buy { background:#0d2818; color:var(--green); }
  .badge-sell { background:#2d1117; color:var(--red); }
  .badge-win { background:#0d2818; color:var(--green); }
  .badge-loss { background:#2d1117; color:var(--red); }
  .symbol-filter { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
  .sym-btn { padding:3px 10px; border-radius:12px; border:1px solid var(--border);
             background:transparent; color:var(--muted); cursor:pointer; font-size:0.78rem; }
  .sym-btn.active { color:#fff; }
  .sym-BTC.active { background:#f7931a55; border-color:#f7931a; color:#f7931a; }
  .sym-ETH.active { background:#627eea55; border-color:#627eea; color:#627eea; }
  .sym-XRP.active { background:#346aa955; border-color:#346aa9; color:#346aa9; }
  .sym-ALL.active { background:#58a6ff55; border-color:#58a6ff; color:#58a6ff; }
  .progress-bar { height:6px; border-radius:3px; background:#21262d; overflow:hidden; margin-top:8px; }
  .progress-fill { height:100%; border-radius:3px; }
  #noData { display:none; text-align:center; color:var(--muted); padding:40px; }
  .pnl-pos { color: var(--green); } .pnl-neg { color: var(--red); }
</style>
</head>
<body>

<h1>📊 트레이더 마크 — 모의투자 대시보드</h1>
<div class="subtitle" id="lastUpdated">로딩 중...</div>

<!-- KPI 카드 -->
<div class="grid grid-5" style="margin-bottom:16px" id="kpiGrid">
  <div class="card">
    <h2>현재 자본</h2>
    <div class="stat" id="kpiCapital">-</div>
    <div class="stat-sub" id="kpiCapitalSub">-</div>
  </div>
  <div class="card">
    <h2>누적 수익률</h2>
    <div class="stat" id="kpiReturn">-</div>
    <div class="stat-sub" id="kpiReturnSub">-</div>
  </div>
  <div class="card">
    <h2>총 거래 횟수</h2>
    <div class="stat neu" id="kpiTrades">-</div>
    <div class="stat-sub" id="kpiTradesSub">-</div>
  </div>
  <div class="card">
    <h2>승률 / 손익비</h2>
    <div class="stat" id="kpiWin">-</div>
    <div class="stat-sub" id="kpiWinSub">-</div>
  </div>
  <div class="card">
    <h2>💸 총 수수료 (0.05%)</h2>
    <div class="stat down" id="kpiFee">-</div>
    <div class="stat-sub" id="kpiFeeSub">손익분기: +0.10% 필요</div>
  </div>
</div>

<!-- 자본 곡선 + 심볼 필터 -->
<div class="grid grid-3" style="margin-bottom:16px">
  <div class="card">
    <h2>💰 자본 곡선 (거래별, 수수료 반영)</h2>
    <div class="chart-wrap-lg">
      <canvas id="chartCapital"></canvas>
    </div>
  </div>
  <div class="card">
    <h2>🥧 심볼별 거래 비중</h2>
    <div class="chart-wrap-lg" style="height:200px">
      <canvas id="chartPie"></canvas>
    </div>
    <div style="margin-top:12px">
      <h2>전략별 현황</h2>
      <div id="strategyStats" style="margin-top:8px;font-size:0.82rem"></div>
    </div>
  </div>
</div>

<!-- 매수/매도 가격 차트 -->
<div class="card" style="margin-bottom:16px">
  <h2>📈 매수·매도 가격 & 수익/손실</h2>
  <div class="symbol-filter" id="symFilter">
    <button class="sym-btn sym-ALL active" data-sym="ALL" onclick="filterSym('ALL',this)">전체</button>
    <button class="sym-btn sym-BTC" data-sym="KRW-BTC" onclick="filterSym('KRW-BTC',this)">₿ BTC</button>
    <button class="sym-btn sym-ETH" data-sym="KRW-ETH" onclick="filterSym('KRW-ETH',this)">Ξ ETH</button>
    <button class="sym-btn sym-XRP" data-sym="KRW-XRP" onclick="filterSym('KRW-XRP',this)">✕ XRP</button>
  </div>
  <div class="chart-wrap-lg" style="height:300px">
    <canvas id="chartBuySell"></canvas>
  </div>
</div>

<!-- 손익 분포 + 시간별 거래 -->
<div class="grid grid-2" style="margin-bottom:16px">
  <div class="card">
    <h2>📊 거래별 PnL 분포</h2>
    <div class="chart-wrap">
      <canvas id="chartPnl"></canvas>
    </div>
  </div>
  <div class="card">
    <h2>⏰ 시간대별 거래 빈도</h2>
    <div class="chart-wrap">
      <canvas id="chartHour"></canvas>
    </div>
  </div>
</div>

<!-- 거래 내역 테이블 -->
<div class="card">
  <h2>📋 전체 거래 내역</h2>
  <div class="tab-bar">
    <button class="tab active" onclick="filterTable('ALL',this)">전체 (44)</button>
    <button class="tab" onclick="filterTable('BUY',this)">매수</button>
    <button class="tab" onclick="filterTable('SELL',this)">매도</button>
    <button class="tab" onclick="filterTable('WIN',this)">수익</button>
    <button class="tab" onclick="filterTable('LOSS',this)">손실</button>
  </div>
  <div style="overflow-x:auto">
    <table id="tradeTable">
      <thead>
        <tr>
          <th>#</th><th>시간</th><th>구분</th><th>심볼</th>
          <th>가격</th><th>수량</th><th>금액</th>
          <th>PnL (%)</th><th>손익(원)</th><th>전략</th>
        </tr>
      </thead>
      <tbody id="tradeBody"></tbody>
    </table>
    <div id="noData">표시할 데이터가 없습니다</div>
  </div>
</div>

<script>
// ─── 데이터 로드 ───────────────────────────────────────────────────────
const DATA_PATH = "/api/portfolio";
let allTrades = [], portfolio = {};
let buySellChart = null, currentSym = 'ALL';

async function loadData() {
  try {
    const r = await fetch(DATA_PATH + '?t=' + Date.now());
    portfolio = await r.json();
  } catch(e) {
    // fallback: embed data inline when opened as file://
    portfolio = PORTFOLIO_DATA;
  }
  init();
}

function fmt(n, d=0) { return Number(n).toLocaleString('ko-KR', {minimumFractionDigits:d, maximumFractionDigits:d}); }
function fmtPct(n) { const v=Number(n); return (v>=0?'+':'')+v.toFixed(3)+'%'; }
function fmtTime(s) { return s.split('T')[1]?.substring(0,8) || s; }

function init() {
  allTrades = portfolio.trade_log || [];
  const capital = portfolio.capital || 1000000;
  const initCap = 1000000;
  const ret = (capital - initCap) / initCap * 100;
  const sells = allTrades.filter(t=>t.side==='SELL');
  const wins = sells.filter(t=>(t.pnl||0)>0).length;
  const winRate = sells.length ? (wins/sells.length*100) : 0;
  const avgWin = sells.filter(t=>(t.pnl||0)>0).reduce((a,t)=>a+(t.pnl||0),0) / (wins||1) * 100;
  const avgLoss = Math.abs(sells.filter(t=>(t.pnl||0)<=0).reduce((a,t)=>a+(t.pnl||0),0) / ((sells.length-wins)||1)) * 100;
  const rr = avgLoss > 0 ? avgWin/avgLoss : 0;

  // KPI
  document.getElementById('kpiCapital').textContent = fmt(capital)+'원';
  document.getElementById('kpiCapital').className = 'stat ' + (ret>=0?'up':'down');
  document.getElementById('kpiCapitalSub').textContent = '초기: 1,000,000원';
  document.getElementById('kpiReturn').textContent = fmtPct(ret);
  document.getElementById('kpiReturn').className = 'stat ' + (ret>=0?'up':'down');
  document.getElementById('kpiReturnSub').textContent = (ret>=0?'+':'')+fmt(capital-initCap)+'원';
  document.getElementById('kpiTrades').textContent = allTrades.length+'회';
  document.getElementById('kpiTradesSub').textContent = `매수 ${allTrades.filter(t=>t.side==='BUY').length}회 / 매도 ${sells.length}회`;
  document.getElementById('kpiWin').textContent = winRate.toFixed(1)+'%';
  document.getElementById('kpiWin').className = 'stat ' + (winRate>=55?'up':winRate>=40?'neu':'down');
  document.getElementById('kpiWinSub').textContent = `손익비 ${rr.toFixed(2)} | ${wins}승 ${sells.length-wins}패`;
  // 수수료 계산 (새 형식 데이터는 total_fee 필드, 구 데이터는 추정)
  const totalFee = allTrades.filter(t=>t.side==='SELL').reduce((a,t)=>a+(t.total_fee||0),0);
  const sellCount = allTrades.filter(t=>t.side==='SELL').length;
  const estFee = totalFee > 0 ? totalFee : allTrades.length * 4.95;
  const isEst  = totalFee === 0 && allTrades.length > 0;
  document.getElementById('kpiFee').textContent = fmt(estFee)+'원';
  document.getElementById('kpiFeeSub').textContent = (isEst?'[추정] ':'')+'거래당 '+fmt(estFee/Math.max(sellCount,1),1)+'원';

  document.getElementById('lastUpdated').textContent = `마지막 업데이트: ${portfolio.last_updated?.substring(0,16)||'-'} | 시작일: ${portfolio.started_at?.substring(0,10)||'-'}`;

  buildCapitalChart();
  buildPieChart();
  buildBuySellChart('ALL');
  buildPnlChart();
  buildHourChart();
  buildStrategyStats();
  buildTable(allTrades);
}

// ─── 자본 곡선 ─────────────────────────────────────────────────────────
function buildCapitalChart() {
  let cap = 1000000;
  const labels = ['시작'], vals = [cap];
  allTrades.forEach((t,i) => {
    if (t.side==='SELL') cap += (t.profit||0);
    labels.push(i+1);
    vals.push(+cap.toFixed(2));
  });
  const ctx = document.getElementById('chartCapital').getContext('2d');
  const gradient = ctx.createLinearGradient(0,0,0,300);
  gradient.addColorStop(0,'rgba(88,166,255,0.3)');
  gradient.addColorStop(1,'rgba(88,166,255,0.0)');
  new Chart(ctx, {
    type:'line',
    data:{ labels, datasets:[{
      label:'자본(원)', data:vals,
      borderColor:'#58a6ff', backgroundColor:gradient,
      borderWidth:2, pointRadius:2, pointHoverRadius:5, fill:true, tension:0.3
    }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false},
        tooltip:{ callbacks:{ label: c=>'₩ '+fmt(c.raw) } }
      },
      scales:{
        x:{ grid:{color:'#21262d'}, ticks:{color:'#8b949e', maxTicksLimit:10} },
        y:{ grid:{color:'#21262d'}, ticks:{color:'#8b949e', callback:v=>fmt(v)+'원' } }
      }
    }
  });
}

// ─── 파이 차트 ─────────────────────────────────────────────────────────
function buildPieChart() {
  const counts = {};
  allTrades.forEach(t=>{ counts[t.symbol]=(counts[t.symbol]||0)+1; });
  const labels=Object.keys(counts), vals=Object.values(counts);
  const colors=['#f7931a','#627eea','#346aa9'];
  new Chart(document.getElementById('chartPie').getContext('2d'), {
    type:'doughnut',
    data:{ labels, datasets:[{ data:vals, backgroundColor:colors, borderColor:'#161b22', borderWidth:2 }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:'right', labels:{color:'#e6edf3', font:{size:12}} } }
    }
  });
}

// ─── 매수·매도 가격 차트 ───────────────────────────────────────────────
function buildBuySellChart(sym) {
  const trades = sym==='ALL' ? allTrades : allTrades.filter(t=>t.symbol===sym);
  const symSet = [...new Set(trades.map(t=>t.symbol))];
  const symColors = {'KRW-BTC':'#f7931a','KRW-ETH':'#627eea','KRW-XRP':'#346aa9'};

  const datasets = [];
  symSet.forEach(s => {
    const sysTrades = trades.filter(t=>t.symbol===s);
    const buys = sysTrades.filter(t=>t.side==='BUY').map((t,i)=>({
      x: t.date.split('T')[1]?.substring(0,8), y:t.price,
      label:t, idx: allTrades.indexOf(t)
    }));
    const sellsWin = sysTrades.filter(t=>t.side==='SELL'&&(t.pnl||0)>0).map(t=>({
      x: t.date.split('T')[1]?.substring(0,8), y:t.price, label:t
    }));
    const sellsLoss = sysTrades.filter(t=>t.side==='SELL'&&(t.pnl||0)<=0).map(t=>({
      x: t.date.split('T')[1]?.substring(0,8), y:t.price, label:t
    }));

    const sName = s.replace('KRW-','');
    datasets.push({
      label:`${sName} 매수`, data:buys.map(b=>({x:b.x, y:b.y})),
      backgroundColor: symColors[s]+'cc', borderColor: symColors[s],
      pointStyle:'triangle', pointRadius:10, pointHoverRadius:14, type:'scatter',
      _raw: buys
    });
    datasets.push({
      label:`${sName} 익절`, data:sellsWin.map(b=>({x:b.x,y:b.y})),
      backgroundColor:'#3fb95088', borderColor:'#3fb950',
      pointStyle:'rectRot', pointRadius:8, pointHoverRadius:12, type:'scatter',
      _raw: sellsWin
    });
    datasets.push({
      label:`${sName} 손절`, data:sellsLoss.map(b=>({x:b.x,y:b.y})),
      backgroundColor:'#f8514988', borderColor:'#f85149',
      pointStyle:'crossRot', pointRadius:8, pointHoverRadius:12, type:'scatter',
      _raw: sellsLoss
    });
  });

  if (buySellChart) buySellChart.destroy();
  const ctx = document.getElementById('chartBuySell').getContext('2d');
  buySellChart = new Chart(ctx, {
    type:'scatter',
    data:{ datasets },
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{ labels:{color:'#e6edf3', usePointStyle:true, font:{size:11}} },
        tooltip:{ callbacks:{
          label: function(c) {
            const raw = c.dataset._raw?.[c.dataIndex]?.label;
            if (!raw) return '';
            const side = raw.side==='BUY'?'매수':'매도';
            const pnl = raw.pnl!=null ? ` | PnL: ${fmtPct(raw.pnl*100)} (${fmt(raw.profit||0)}원)` : '';
            return `${side} ${raw.symbol} @ ${fmt(raw.price)} | ${fmt(raw.volume,6)}개${pnl}`;
          }
        }}
      },
      scales:{
        x:{ type:'category', grid:{color:'#21262d'}, ticks:{color:'#8b949e', maxRotation:45} },
        y:{ grid:{color:'#21262d'}, ticks:{color:'#8b949e', callback:v=>fmt(v)} }
      }
    }
  });
}

function filterSym(sym, btn) {
  document.querySelectorAll('.sym-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildBuySellChart(sym);
}

// ─── PnL 분포 히스토그램 ────────────────────────────────────────────────
function buildPnlChart() {
  const sells = allTrades.filter(t=>t.side==='SELL'&&t.pnl!=null);
  const pnls = sells.map(t=>+(t.pnl*100).toFixed(3));
  const buckets = {};
  pnls.forEach(p => {
    const b = (Math.floor(p*10)/10).toFixed(1);
    buckets[b] = (buckets[b]||0)+1;
  });
  const labels = Object.keys(buckets).sort((a,b)=>+a-+b);
  const vals = labels.map(k=>buckets[k]);
  const colors = labels.map(k=>+k>=0?'#3fb95088':'#f8514988');
  const borderColors = labels.map(k=>+k>=0?'#3fb950':'#f85149');

  new Chart(document.getElementById('chartPnl').getContext('2d'), {
    type:'bar',
    data:{ labels, datasets:[{
      label:'거래 수', data:vals,
      backgroundColor:colors, borderColor:borderColors, borderWidth:1
    }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        x:{ grid:{color:'#21262d'}, ticks:{color:'#8b949e'}, title:{display:true,text:'PnL (%)',color:'#8b949e'} },
        y:{ grid:{color:'#21262d'}, ticks:{color:'#8b949e', stepSize:1}, title:{display:true,text:'건수',color:'#8b949e'} }
      }
    }
  });
}

// ─── 시간대별 거래 ──────────────────────────────────────────────────────
function buildHourChart() {
  const hours = Array(24).fill(0);
  allTrades.forEach(t => {
    const h = parseInt(t.date.split('T')[1]?.substring(0,2)||'0');
    hours[h]++;
  });
  new Chart(document.getElementById('chartHour').getContext('2d'), {
    type:'bar',
    data:{
      labels: hours.map((_,i)=>i+'시'),
      datasets:[{ label:'거래 수', data:hours,
        backgroundColor:'#58a6ff55', borderColor:'#58a6ff', borderWidth:1 }]
    },
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        x:{ grid:{color:'#21262d'}, ticks:{color:'#8b949e',maxTicksLimit:12} },
        y:{ grid:{color:'#21262d'}, ticks:{color:'#8b949e', stepSize:1} }
      }
    }
  });
}

// ─── 전략별 통계 ────────────────────────────────────────────────────────
function buildStrategyStats() {
  const strats = {};
  allTrades.forEach(t => {
    const s = t.strategy||'UNKNOWN';
    if (!strats[s]) strats[s]={count:0,wins:0,pnl:0};
    strats[s].count++;
    if (t.side==='SELL') { if((t.pnl||0)>0) strats[s].wins++; strats[s].pnl+=(t.profit||0); }
  });
  const html = Object.entries(strats).map(([name,s])=>`
    <div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:0.82rem">
        <span style="color:#58a6ff">${name}</span>
        <span class="${s.pnl>=0?'pnl-pos':'pnl-neg'}">${fmt(s.pnl)}원</span>
      </div>
      <div style="font-size:0.75rem;color:#8b949e;margin-top:2px">${s.count}회 | 승률 ${s.count>0?(s.wins/Math.ceil(s.count/2)*100).toFixed(0):0}%</div>
    </div>
  `).join('');
  document.getElementById('strategyStats').innerHTML = html || '<div style="color:#8b949e">데이터 없음</div>';
}

// ─── 거래 내역 테이블 ──────────────────────────────────────────────────
let currentFilter = 'ALL';
function buildTable(trades) {
  const tbody = document.getElementById('tradeBody');
  const filtered = filterTradesByTab(trades, currentFilter);
  document.getElementById('noData').style.display = filtered.length?'none':'block';
  tbody.innerHTML = filtered.map((t,i)=>{
    const isSell = t.side==='SELL';
    const pnl = t.pnl!=null ? t.pnl*100 : null;
    const profit = t.profit||null;
    const amount = isSell ? (t.value||0) : (t.cost||0);
    const sym = t.symbol.replace('KRW-','');
    return `<tr>
      <td style="color:#8b949e">${i+1}</td>
      <td style="font-family:monospace;font-size:0.78rem">${fmtTime(t.date)}</td>
      <td><span class="badge ${isSell?'badge-sell':'badge-buy'}">${isSell?'매도':'매수'}</span></td>
      <td style="font-weight:600;color:${sym==='BTC'?'#f7931a':sym==='ETH'?'#627eea':'#346aa9'}">${sym}</td>
      <td style="font-family:monospace">${fmt(t.price)}</td>
      <td style="font-family:monospace;font-size:0.78rem">${Number(t.volume).toFixed(6)}</td>
      <td style="font-family:monospace">${fmt(amount)}원</td>
      <td class="${pnl==null?'':pnl>0?'pnl-pos':'pnl-neg'}" style="font-family:monospace">
        ${pnl!=null?fmtPct(pnl):'-'}
      </td>
      <td class="${profit==null?'':profit>0?'pnl-pos':'pnl-neg'}" style="font-family:monospace">
        ${profit!=null?(profit>=0?'+':'')+fmt(profit)+'원':'-'}
      </td>
      <td style="font-size:0.75rem;color:#8b949e">${t.strategy||'-'}</td>
    </tr>`;
  }).join('');
}

function filterTradesByTab(trades, filter) {
  if (filter==='BUY') return trades.filter(t=>t.side==='BUY');
  if (filter==='SELL') return trades.filter(t=>t.side==='SELL');
  if (filter==='WIN') return trades.filter(t=>t.side==='SELL'&&(t.pnl||0)>0);
  if (filter==='LOSS') return trades.filter(t=>t.side==='SELL'&&(t.pnl||0)<=0);
  return trades;
}

function filterTable(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildTable(allTrades);
}

// ─── 탭 버튼 카운트 업데이트 ────────────────────────────────────────────
function updateTabCounts() {
  const tabs = document.querySelectorAll('.tab');
  const counts = {
    ALL: allTrades.length,
    BUY: allTrades.filter(t=>t.side==='BUY').length,
    SELL: allTrades.filter(t=>t.side==='SELL').length,
    WIN: allTrades.filter(t=>t.side==='SELL'&&(t.pnl||0)>0).length,
    LOSS: allTrades.filter(t=>t.side==='SELL'&&(t.pnl||0)<=0).length
  };
  const labels = ['전체','매수','매도','수익','손실'];
  const keys = ['ALL','BUY','SELL','WIN','LOSS'];
  tabs.forEach((btn,i) => { btn.textContent = `${labels[i]} (${counts[keys[i]]})`; });
}
